<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette Generator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="color.css" />
  </head>
  <body>
    <div class="container">
      <h1>Color Palette Generator</h1>

      <button id="generator-btn">
        <i class="fas fa-sync-all"></i>
        Generate Palette
      </button>

      <div class="palette-container">
        <div class="color-box">
          <div class="color" style="background-color: #007bff"></div>
          <div class="color-info">
            <span class="hex-value">#007BFF</span>
            <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
        <div class="color-box">
          <div class="color" style="background-color: #0bb1f8"></div>
          <div class="color-info">
            <span class="hex-value">#0BB1F8</span>
            <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
        <div class="color-box">
          <div class="color" style="background-color: #eb1b30"></div>
          <div class="color-info">
            <span class="hex-value">#EB1B30</span>
            <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
        <div class="color-box">
          <div class="color" style="background-color: #140101"></div>
          <div class="color-info">
            <span class="hex-value">#140101</span>
            <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
        <div class="color-box">
          <div class="color" style="background-color: #18ed86"></div>
          <div class="color-info">
            <span class="hex-value">#18ED86</span>
            <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
      </div>
    </div>

    <script src="color.js"></script>
  </body>
</html>
